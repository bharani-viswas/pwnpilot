$schema: "http://json-schema.org/draft-07/schema#"
title: Engagement
type: object
required:
  - engagement_id
  - name
  - operator_id
  - scope
  - roe_document_hash
  - authoriser_identity
  - valid_from
  - valid_until
properties:
  engagement_id:
    type: string
    format: uuid
  name:
    type: string
    minLength: 1
  operator_id:
    type: string
    minLength: 1
  scope:
    type: object
    properties:
      scope_cidrs:
        type: array
        items:
          type: string
      scope_domains:
        type: array
        items:
          type: string
      scope_urls:
        type: array
        items:
          type: string
  roe_document_hash:
    type: string
    minLength: 64
  authoriser_identity:
    type: string
    minLength: 1
  valid_from:
    type: string
    format: date-time
  valid_until:
    type: string
    format: date-time
  schema_version:
    type: string
    const: "v1"
additionalProperties: false
