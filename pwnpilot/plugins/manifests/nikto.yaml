name: nikto
version: 2.x
risk_class: active_scan
description: Web server vulnerability scanner with OSVDB/CVE references
binary: nikto
input_schema:
  type: object
  required:
  - target
  properties:
    target:
      type: string
    port:
      type: integer
      minimum: 1
      maximum: 65535
      default: 80
    ssl:
      type: boolean
      default: false
    tuning:
      type: string
      default: x
  x_supported_target_types:
  - url
  - domain
  - ip
output_schema:
  type: object
  properties:
    findings:
      type: array
capabilities:
  accepts_payload: false
args:
- nikto
- -host
- '{target}'
- -port
- '{port}'
- -nointeractive
- when: ssl
  parts:
  - -ssl
- when: tuning and tuning != 'x'
  parts:
  - -Tuning
  - '{tuning}'
parse:
  strategy: nikto_text
