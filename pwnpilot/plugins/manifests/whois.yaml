name: whois
version: 5.x
risk_class: passive_recon
description: WHOIS domain registration and ownership lookup
binary: whois
input_schema:
  type: object
  required:
  - target
  properties:
    target:
      type: string
  x_supported_target_types:
  - domain
  - ip
output_schema:
  type: object
  properties:
    findings:
      type: array
capabilities:
  accepts_payload: false
args:
- whois
- '{target}'
parse:
  strategy: whois_text
