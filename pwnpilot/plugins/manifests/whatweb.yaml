name: whatweb
version: '0.5'
risk_class: passive_recon
description: Web technology fingerprinting and banner detection
binary: whatweb
input_schema:
  type: object
  required:
  - target
  properties:
    target:
      type: string
    aggressiveness:
      type: integer
      minimum: 1
      maximum: 4
      default: 2
  x_supported_target_types:
  - url
output_schema:
  type: object
  properties:
    services:
      type: array
capabilities:
  accepts_payload: false
args:
- whatweb
- --aggression
- '{aggressiveness}'
- --log-json=-
- --no-errors
- --color=never
- '{target}'
parse:
  strategy: whatweb_jsonl
