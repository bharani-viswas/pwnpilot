name: nuclei
version: 3.x
risk_class: active_scan
description: Template-driven vulnerability scanner
binary: nuclei
input_schema:
  type: object
  required:
  - target
  properties:
    target:
      type: string
    severity:
      type: string
      enum:
      - info
      - low
      - medium
      - high
      - critical
      default: medium
    rate_limit:
      type: integer
      minimum: 1
      maximum: 500
      default: 50
    template_tags:
      type: array
      default: []
  x_supported_target_types:
  - url
  - domain
  - ip
output_schema:
  type: object
  properties:
    findings:
      type: array
capabilities:
  accepts_payload: false
args:
- nuclei
- -u
- '{target}'
- -severity
- '{severity}'
- -rate-limit
- '{rate_limit}'
- -jsonl
- -silent
- -no-color
parse:
  strategy: nuclei_jsonl
