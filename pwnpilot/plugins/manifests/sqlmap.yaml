name: sqlmap
version: 1.x
risk_class: active_scan
description: Automated SQL injection detection (manifest runtime)
binary: sqlmap
input_schema:
  type: object
  required:
  - target
  properties:
    target:
      type: string
    data:
      type: string
      default: ''
    payload:
      type: string
      default: ''
    level:
      type: integer
      minimum: 1
      maximum: 3
      default: 1
    risk:
      type: integer
      minimum: 1
      maximum: 2
      default: 1
    forms:
      type: boolean
      default: false
  x_supported_target_types:
  - url
output_schema:
  type: object
  properties:
    findings:
      type: array
capabilities:
  accepts_payload: true
  payload_delivery:
    method: arg
    arg_flag: --data
args:
- sqlmap
- -u
- '{target}'
- --level
- '{level}'
- --risk
- '{risk}'
- --batch
- --no-cast
- when: data
  parts:
  - --data
  - '{data}'
- when: payload and not data
  parts:
  - --data
  - '{payload}'
- when: forms
  parts:
  - --forms
parse:
  strategy: sqlmap_text
