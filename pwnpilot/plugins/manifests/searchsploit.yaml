name: searchsploit
version: '2024'
risk_class: passive_recon
description: Search Exploit-DB entries by service/product query
binary: searchsploit
input_schema:
  type: object
  required:
  - query
  properties:
    query:
      type: string
    exact:
      type: boolean
      default: false
  x_supported_target_types:
  - text
output_schema:
  type: object
  properties:
    findings:
      type: array
capabilities:
  accepts_payload: false
args:
- searchsploit
- --json
- when: exact
  parts:
  - --exact
- '{query}'
parse:
  strategy: searchsploit_json
