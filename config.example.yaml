# =============================================================================
# ENVIRONMENT VARIABLE OVERRIDES
# =============================================================================
#
# All config values can be overridden via environment variables:
#
# Format: PWNPILOT_<SECTION>__<KEY>=value
#
# Examples:
#   PWNPILOT_LLM__MODEL_NAME=gpt-4
#   PWNPILOT_LLM__API_KEY=sk-...
#   PWNPILOT_LLM__CLOUD_ALLOWED=true
#   PWNPILOT_LOGGING__LEVEL=DEBUG
#   PWNPILOT_POLICY__ACTIVE_SCAN_RATE_LIMIT=20
#
# Environment variables take precedence over config.yaml!
# This is useful for:
#   - Running in Docker/K8s (use secrets as env vars)
#   - CI/CD pipelines (set via GitHub Actions secrets)
#   - Deployment automation (pass via Ansible/Terraform)
#   - Local testing (override temporarily without editing yaml)

# =============================================================================
