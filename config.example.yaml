# PwnPilot Configuration Example
# Save as: ~/.pwnpilot/config.yaml or /etc/pwnpilot/config.yaml
#
# All settings can be overridden with environment variables:
# PWNPILOT_<SECTION>__<KEY>=value (use double underscore for nested keys)

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
database:
  # SQLAlchemy database URL
  # Examples:
  #   sqlite:///pwnpilot.db                  (local file)
  #   postgresql://user:pass@localhost/pwnpilot  (PostgreSQL)
  #   mysql+pymysql://user:pass@localhost/pwnpilot (MySQL)
  url: "sqlite:////var/lib/pwnpilot/pwnpilot.db"
  
  # Connection pool settings
  pool_size: 5        # Active connections to maintain
  max_overflow: 10    # Additional connections if pool exhausted

# =============================================================================
# LLM CONFIGURATION - UNIFIED MULTI-PROVIDER SUPPORT (via LiteLLM)
# =============================================================================
llm:
  # ═══════════════════════════════════════════════════════════════════════
  # PRIMARY MODEL CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════
  
  # Model identifier (determines provider)
  # Examples:
  #   "gpt-4"                           → OpenAI GPT-4
  #   "gpt-3.5-turbo"                  → OpenAI GPT-3.5
  #   "claude-3-sonnet-20240229"       → Anthropic Claude 3
  #   "claude-3-opus-20240229"         → Anthropic Claude 3 Opus
  #   "gemini-pro"                     → Google Gemini
  #   "mistral/mistral-large-latest"   → Mistral AI
  #   "ollama/llama3"                  → Local Ollama (Llama 3)
  #   "ollama/mistral"                 → Local Ollama (Mistral)
  #   "ollama/neural-chat"             → Local Ollama (Neural Chat)
  model_name: "ollama/llama3"
  
  # API key for the primary provider
  # Can be left empty for local models (Ollama, vLLM on localhost)
  # Environment variable override: PWNPILOT_LLM__API_KEY
  api_key: ""
  
  # Custom API base URL (optional)
  # Used for: self-hosted Ollama, vLLM, LocalAI, or custom OpenAI-compatible endpoints
  # Examples:
  #   "http://localhost:11434"         → Ollama on localhost
  #   "http://localhost:8000/v1"       → vLLM on localhost
  #   "http://internal-gpu-01:8000/v1" → Internal vLLM cluster
  #   "http://localhost:8080/v1"       → LocalAI
  #   (leave empty for official APIs)
  api_base_url: ""

  # ═══════════════════════════════════════════════════════════════════════
  # FALLBACK MODEL CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════
  
  # Fallback model if primary fails and cloud_allowed=true
  # Recommended: Use a cloud provider for redundancy
  # Examples:
  #   "gpt-4o-mini"                    → OpenAI (cost-effective)
  #   "claude-3-haiku-20240307"        → Anthropic (fast, cheap)
  #   "gemini-1.5-pro"                 → Google Gemini
  fallback_model_name: "gpt-4o-mini"
  
  # API key for fallback model
  # Environment variable override: PWNPILOT_LLM__FALLBACK_API_KEY
  fallback_api_key: ""
  
  # Custom base URL for fallback model (optional)
  fallback_api_base_url: ""

  # ═══════════════════════════════════════════════════════════════════════
  # POLICY & CONTROL
  # ═══════════════════════════════════════════════════════════════════════
  
  # Allow cloud fallback when primary model fails?
  # ⚠️ Important: Cost control gate!
  #   true  → Can fall back to cloud provider (may incur costs)
  #   false → Halt assessment if primary fails (zero cloud costs)
  cloud_allowed: false

  # ═══════════════════════════════════════════════════════════════════════
  # PERFORMANCE & RESILIENCE
  # ═══════════════════════════════════════════════════════════════════════
  
  # Maximum retry attempts per model
  # Circuit breaker opens after this many consecutive failures
  max_retries: 3
  
  # Request timeout in seconds
  # Increase for slow models/networks, decrease for fast failover
  timeout_seconds: 30

# =============================================================================
# EMBEDDING MODEL CONFIGURATION - SAME ROUTING PATTERN AS LLM (via LiteLLM)
# =============================================================================
embedding:
  # Primary embedding model
  # Examples:
  #   "text-embedding-3-small"        → OpenAI
  #   "text-embedding-3-large"        → OpenAI
  #   "ollama/nomic-embed-text"       → Local Ollama
  model_name: "ollama/nomic-embed-text"

  # Primary provider credentials/endpoint
  api_key: ""
  api_base_url: ""

  # Fallback embedding model (used when primary fails and cloud_allowed=true)
  fallback_model_name: "text-embedding-3-small"
  fallback_api_key: ""
  fallback_api_base_url: ""

  # Cloud fallback policy gate
  cloud_allowed: false

  # Retry/timeout behavior
  max_retries: 3
  timeout_seconds: 30

# =============================================================================
# TOOLS CONFIGURATION — Resource Limits & Plugin Discovery
# =============================================================================
tools:
  # Maximum virtual memory per tool subprocess (MB)
  # Increase this if tools like Nuclei or WhatWeb run out of memory
  # Examples:
  #   512   MB  — minimum, resource-constrained environments
  #   2048  MB  — default, recommended for most deployments
  #   4096  MB  — high-performance, for intensive scanning
  memory_limit_mb: 2048
  
  # Tool discovery and trust configuration (advanced)
  # Uncomment to customize behavior
  
  # discovery_mode: "package"
  # Options: package, entrypoints, package_and_entrypoints
  
  # trust_mode: "first_party_only"
  # Options: first_party_only, allow_trusted_third_party, strict_signed_all

# =============================================================================
# POLICY CONFIGURATION
# =============================================================================
policy:
  # Maximum active_scan actions per minute (rate limiting)
  # Controls aggressiveness of active reconnaissance
  active_scan_rate_limit: 10
  
  # Soft rate limit for passive reconnaissance (logs warning only)
  recon_passive_soft_limit: 60
  
  # Require operator approval for exploitation?
  require_approval_for_exploit: true
  
  # Require operator approval for post-exploitation?
  require_approval_for_post_exploit: true

# =============================================================================
# AGENT CONFIGURATION
# =============================================================================
agent:
  # Maximum iterations (planning cycles) per engagement
  # Lower = faster termination, higher = deeper assessment
  max_iterations: 50

  # Hard cap for consecutive planner->validator cycles without executor progress.
  # Prevents long reject/replan churn loops.
  max_planner_validator_cycles_without_executor: 40

  # Hard cap for repeated validator rejects with the same reason code/class.
  # Forces deterministic termination instead of infinite retrying.
  max_consecutive_rejects_per_reason: 12
  
  # Convergence threshold: consecutive cycles with no new findings
  # When reached, assessment auto-terminates (enables cost control)
  convergence_threshold: 3

# =============================================================================
# STORAGE CONFIGURATION
# =============================================================================
storage:
  # Root directory for raw evidence files (tool outputs, screenshots, etc.)
  evidence_dir: "~/.pwnpilot/evidence"
  
  # Output directory for generated reports
  report_dir: "reports"

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  # Use DEBUG for troubleshooting, INFO for production
  level: "INFO"

  # Stdout log format:
  #   console -> human-readable key/value logs (recommended for interactive runs)
  #   json    -> structured JSON on stdout
  stdout_format: "console"
  
  # Log file path (empty = stdout only)
  # Examples:
  #   "/var/log/pwnpilot/pwnpilot.log"
  #   "/home/operator/.pwnpilot/logs/assessment.log"
  #   "" (leave empty for stdout only)
  file: ""
  
  # Log rotation interval (days)
  # Old logs deleted after this many days
  rotation_days: 30

# =============================================================================
# ENGAGEMENT DEFAULTS
# =============================================================================
engagement:
  # Valid engagement duration (hours)
  # Engagements auto-archive after this duration
  valid_hours: 24
  
  # Default operator identifier
  operator_id: "operator"

# =============================================================================
# CONFIGURATION EXAMPLES BY USE CASE
# =============================================================================

